<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dypin Darkroom Gallery</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <main class="darkroom-world">

    <section class="zone zone-1">
      <div class="halo"></div>
      <div class="content">
        <div class="text">
          <span>ZONE 01</span>
          <h1>THE ENLARGER</h1>
          <p>Light meets chemistry.</p>
        </div>
        <div class="scene enlarger-scene">
          <img src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?q=80&w=1600&auto=format&fit=crop" class="hero-image"/>
        </div>
      </div>
    </section>

    <section class="zone zone-2">
      <div class="halo"></div>
      <div class="content reverse">
        <div class="scene contact-scene">
          <div class="floating-print p1"></div>
          <div class="floating-print p2"></div>
          <div class="floating-print p3"></div>
        </div>
        <div class="text">
          <span>ZONE 02</span>
          <h1>CONTACT WALL</h1>
          <p>Pinned cinematic memories.</p>
        </div>
      </div>
    </section>

    <section class="zone zone-3">
      <div class="halo"></div>
      <div class="content">
        <div class="text">
          <span>ZONE 03</span>
          <h1>DRYING LINE</h1>
          <p>Suspended image residue.</p>
        </div>
        <div class="scene drying-scene">
          <div class="wire"></div>
          <div class="hanging h1"></div>
          <div class="hanging h2"></div>
          <div class="hanging h3"></div>
        </div>
      </div>
    </section>

    <section class="zone zone-4">
      <div class="halo"></div>
      <div class="content reverse">
        <div class="scene chemistry-scene">
          <div class="tray">
            <div class="water"></div>
            <div class="immersed-print"></div>
          </div>
        </div>
        <div class="text">
          <span>ZONE 04</span>
          <h1>THE CHEMISTRY</h1>
          <p>Images immersed in liquid light.</p>
        </div>
      </div>
    </section>

    <section class="zone zone-5">
      <div class="halo"></div>
      <div class="content">
        <div class="text">
          <span>ZONE 05</span>
          <h1>THE ARCHIVE</h1>
          <p>Preserved cinematic frames.</p>
        </div>
        <div class="scene archive-scene">
          <img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?q=80&w=1600&auto=format&fit=crop" class="archive-image"/>
        </div>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
