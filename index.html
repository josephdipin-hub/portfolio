<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dypin Joseph | Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>
    <div id="glsl-canvas"></div>
    
    <main class="main-content">
        <!-- UNTOUCHED HERO -->
        <section class="min-h-screen">
            <h1 class="hero-text">DYPIN JOSEPH</h1>
            <div class="metadata">LOC: BLR // STU: ADITYA</div>
        </section>

        <!-- UNTOUCHED FASHION -->
        <section id="fashion-gallery">
            <span class="dr-section-label">FASHION_EDITORIAL</span>
            <div class="dr-mobile-photos">
                <div class="dr-mobile-photo"><img src="images/fashion-1.webp" class="developed"></div>
            </div>
        </section>

        <!-- REBUILT PRODUCT SECTION -->
        <section id="product-technical-section">
            <span class="tech-label">SECTION: PRODUCT_ARCHIVE // TRAY_01</span>
            <div class="product-grid">
                <div class="product-item" data-id="GEAR_01">
                    <img src="images/product-1.webp" alt="Product">
                </div>
                <div class="product-item submerged" data-id="LIQUID_02">
                    <img src="images/product-2.webp" alt="Product">
                </div>
            </div>
        </section>
    </main>

    <div id="three-prop-container"></div>
    <script src="script.js"></script>
</body>
</html>
