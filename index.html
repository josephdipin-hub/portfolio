<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dypin Joseph | Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>
    <!-- YOUR ORIGINAL LANDING PAGE ELEMENTS -->
    <div id="glsl-canvas"></div>
    
    <main class="main-content">
        <!-- UNTOUCHED HERO SECTION -->
        <section class="min-h-screen">
            <h1 class="hero-text">DYPIN JOSEPH</h1>
            <div class="metadata">LOC: BLR // STU: ADITYA</div>
        </section>

        <!-- UNTOUCHED FASHION GALLERY -->
        <section id="fashion-gallery" class="gallery-section">
            <span class="section-label">FASHION_EDITORIAL</span>
            <div class="dr-mobile-photos">
                <div class="dr-mobile-photo"><img src="fashion1.jpg" class="developed"></div>
                <div class="dr-mobile-photo"><img src="fashion2.jpg" class="developed"></div>
            </div>
        </section>

        <!-- REBUILT PRODUCT GALLERY (David Langarica Style) -->
        <section id="stylized-product-gallery">
            <span class="section-label">PRODUCT_TECHNICAL_ARCHIVE</span>
            <div class="product-grid">
                <!-- Use data-id for technical labels -->
                <div class="product-item" data-id="LENS_REF_01">
                    <img src="product1.jpg" alt="Product">
                </div>
                <div class="product-item" data-id="GEAR_REF_02">
                    <img src="product2.jpg" alt="Product">
                </div>
                <div class="product-item submerged" data-id="LIQUID_REF_03">
                    <img src="product3.jpg" alt="Product Submerged">
                </div>
            </div>
        </section>
    </main>

    <div id="prop-canvas-container"></div>
    <script src="script.js"></script>
</body>
</html>
